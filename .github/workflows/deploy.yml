# ── crelyzor-public CI/CD ─────────────────────────────────────────────────────
#
# Checks:
#   1. Lint
#   2. TypeScript typecheck
#   3. Build
#
# Deploy (only if checks pass):
#   push to main      → production
#   push to staging   → staging
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VM_HOST              VM public IP or hostname
#   VM_USER              SSH user (e.g. ubuntu)
#   VM_SSH_KEY           Full private key content (the PEM, not path)
#   VM_WORKSPACE_PATH    Absolute path on VM (e.g. /home/ubuntu/crelyzor-workspace)

name: Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'prod'
        type: choice
        options: [prod, staging]

jobs:
  # ── Checks ──────────────────────────────────────────────────────────────────
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

  # ── Deploy — only runs if checks pass ────────────────────────────────────────
  deploy:
    name: Deploy — ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    needs: [checks]

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://crelyzor.app' || 'https://staging.crelyzor.app' }}

    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 40m
          script: |
            cd ${{ secrets.VM_WORKSPACE_PATH }}
            ./deploy.sh ${{ steps.env.outputs.name }}
